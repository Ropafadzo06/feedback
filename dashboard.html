<!DOCTYPE html>
<html>
<head>
    <title>Feedback Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
            margin: 0;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .dashboard-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .chart-container {
            width: 450px;
            height: 320px;
        }

        canvas {
            width: 100% !important;
            height: 250px !important;
        }

        h2 {
            text-align: center;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

    <h1>Laboratory Feedback Dashboard</h1>

    <div class="dashboard-container">

        <div class="chart-container">
            <h2>Ratings Distribution</h2>
            <canvas id="ratingChart"></canvas>
        </div>

        <div class="chart-container">
            <h2>Tests Conducted</h2>
            <canvas id="testChart"></canvas>
        </div>

    </div>

    <h2>Recent Feedback</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Test</th>
                <th>Rating</th>
                <th>Feedback</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="feedbackTable">
        </tbody>
    </table>

<script>

async function loadRatingChart() {

    const response = await fetch("http://localhost:3000/rating-stats");
    const data = await response.json();

    const labels = data.map(item => item.rating);
    const totals = data.map(item => item.total);

    new Chart(document.getElementById("ratingChart"), {
        type: "pie",
        data: {
            labels: labels,
            datasets: [{
                data: totals
            }]
        }
    });
}

async function loadTestChart() {

    const response = await fetch("http://localhost:3000/test-stats");
    const data = await response.json();

    const labels = data.map(item => item.test_name);
    const totals = data.map(item => item.total);

    new Chart(document.getElementById("testChart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Number of Feedback Entries",
                data: totals
            }]
        }
    });
}

async function loadFeedbacks() {

    const response = await fetch("http://localhost:3000/feedbacks");
    const feedbacks = await response.json();

    const table = document.getElementById("feedbackTable");

    feedbacks.forEach(item => {

        const row = `
            <tr>
                <td>${item.name || ""}</td>
                <td>${item.email || ""}</td>
                <td>${item.test_name || ""}</td>
                <td>${item.rating || ""}</td>
                <td>${item.feedback || ""}</td>
                <td>${new Date(item.date).toLocaleDateString()}</td>
            </tr>
        `;

        table.innerHTML += row;
    });
}

loadRatingChart();
loadTestChart();
loadFeedbacks();

</script>

</body>
</html>
